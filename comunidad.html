<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNAD Conect - Comunidad Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Shared Top Header -->
        <header class="top-header">
            <div class="logo-section">
                <button id="sidebar-toggle" style="background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 6px; margin-right: 0.2rem;" title="Contraer/Expandir Menú">
                    <i data-lucide="menu"></i>
                </button>
                <div style="display: flex; align-items: center; gap: 0.8rem;" onclick="window.location.href='index.html'" style="cursor:pointer;">
                    <svg width="36" height="36" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="15" fill="#004d99" />
                        <circle cx="20" cy="20" r="10" fill="#ffcc00" />
                        <circle cx="80" cy="20" r="10" fill="#ffcc00" />
                        <circle cx="50" cy="85" r="10" fill="#ffcc00" />
                        <line x1="50" y1="50" x2="20" y2="20" stroke="#004d99" stroke-width="4" />
                        <line x1="50" y1="50" x2="80" y2="20" stroke="#004d99" stroke-width="4" />
                        <line x1="50" y1="50" x2="50" y2="85" stroke="#004d99" stroke-width="4" />
                    </svg>
                    <span style="font-size: 1.2rem; color: var(--accent-primary); font-weight: 400;">UNAD<span style="color: #64748b; font-weight: 400;">Conect</span></span>
                </div>
            </div>
            <div class="search-bar" style="margin-left: 2rem; flex: 0 1 500px;">
                <i data-lucide="search" style="color: #64748b; width: 18px;"></i>
                <input type="text" id="search-community" placeholder="Buscar nuevos compañeros...">
            </div>
            <div class="header-icons" style="margin-left: auto;">
                <i data-lucide="bell"></i>
                <div id="user-avatar-top" style="width: 38px; height: 38px; border-radius: 6px; background: var(--accent-primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 400; cursor: pointer;" onclick="window.location.href='perfil.html'">?</div>
            </div>
        </header>

        <div class="main-body">
            <!-- Shared Sidebar -->
            <aside class="sidebar">
                <nav style="flex: 1;">
                    <a href="index.html" class="nav-item">
                        <i data-lucide="users"></i>
                        <span class="nav-text">Contactos</span>
                    </a>
                    <a href="comunidad.html" class="nav-item active">
                        <i data-lucide="globe"></i>
                        <span class="nav-text">Comunidad</span>
                    </a>
                    <a href="parche.html" class="nav-item">
                        <i data-lucide="shrub"></i>
                        <span class="nav-text">Parches</span>
                    </a>
                    <a href="perfil.html" class="nav-item">
                        <i data-lucide="user-circle"></i>
                        <span class="nav-text">Mi Perfil</span>
                    </a>
                </nav>
            </aside>

            <!-- Page Content -->
            <main class="content-area">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2 class="content-title" style="margin-bottom: 0;">Comunidad UNAD <span style="font-size: 1rem; color: var(--text-secondary); font-weight: 400; margin-left: 0.5rem;">(Descubre compañeros)</span></h2>
                    <div>
                        <select id="filter-center" style="background: #f8fafc; padding: 0.6rem 1rem; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 0.85rem; font-weight: 400; cursor: pointer;">
                            <option value="">🌍 Todos los Centros</option>
                            <option value="Medellín">Medellín</option>
                            <option value="Bogotá">Bogotá</option>
                            <option value="Cali">Cali</option>
                            <option value="Neiva">Neiva</option>
                        </select>
                    </div>
                </div>
                
                <div id="similarities-container">
                    <!-- Global pool rows injected here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="script_pages.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
