<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNAD Conect - Parches</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <header class="top-header">
            <div class="logo-section">
                <button id="sidebar-toggle" style="background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 6px; margin-right: 0.2rem;" title="Contraer/Expandir Menú">
                    <i data-lucide="menu"></i>
                </button>
                <div style="display: flex; align-items: center; gap: 0.8rem; cursor: pointer;" onclick="window.location.href='index.html'">
                    <svg width="36" height="36" viewBox="0 0 100 100" aria-hidden="true">
                        <circle cx="50" cy="50" r="15" fill="#004d99" />
                        <circle cx="20" cy="20" r="10" fill="#ffcc00" />
                        <circle cx="80" cy="20" r="10" fill="#ffcc00" />
                        <circle cx="50" cy="85" r="10" fill="#ffcc00" />
                        <line x1="50" y1="50" x2="20" y2="20" stroke="#004d99" stroke-width="4" />
                        <line x1="50" y1="50" x2="80" y2="20" stroke="#004d99" stroke-width="4" />
                        <line x1="50" y1="50" x2="50" y2="85" stroke="#004d99" stroke-width="4" />
                    </svg>
                    <span style="font-size: 1.2rem; color: var(--accent-primary); font-weight: 400;">UNAD<span style="color: #64748b; font-weight: 400;">Conect</span></span>
                </div>
            </div>
            <div class="search-bar" style="margin-left: 2rem; flex: 0 1 500px;">
                <i data-lucide="search" style="color: #64748b; width: 18px;"></i>
                <input type="text" id="search-parches" placeholder="Buscar materia o código de parche...">
            </div>
            <div class="header-icons" style="margin-left: auto;">
                <i data-lucide="bell"></i>
                <div id="user-avatar-top" style="width: 38px; height: 38px; border-radius: 6px; background: var(--accent-primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 400; cursor: pointer;" onclick="window.location.href='perfil.html'">?</div>
            </div>
        </header>

        <div class="main-body">
            <aside class="sidebar">
                <nav style="flex: 1;">
                    <a href="index.html" class="nav-item">
                        <i data-lucide="users"></i>
                        <span class="nav-text">Contactos</span>
                    </a>
                    <a href="comunidad.html" class="nav-item">
                        <i data-lucide="globe"></i>
                        <span class="nav-text">Comunidad</span>
                    </a>
                    <a href="parche.html" class="nav-item active">
                        <i data-lucide="shrub"></i>
                        <span class="nav-text">Parches</span>
                    </a>
                    <a href="perfil.html" class="nav-item">
                        <i data-lucide="user-circle"></i>
                        <span class="nav-text">Mi Perfil</span>
                    </a>
                </nav>
            </aside>

            <main class="content-area">
                <div id="parches-main-view">
                    <div class="view-header" style="margin-bottom: 1.4rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                        <div style="flex: 1; min-width: 280px;">
                            <h2 style="color: var(--accent-primary); font-size: 1.35rem; font-weight: 400; letter-spacing: 0;">Marketplace de Parches</h2>
                            <p style="color: var(--text-secondary); font-size: 0.86rem; font-weight: 400; margin-top: 0.2rem;">Grupos de estudio por escuela y transversales.</p>
                        </div>

                        <div style="display: flex; gap: 0.7rem; align-items: center;">
                            <select id="filter-academic-type" style="background: #f8fafc; padding: 0.55rem 0.8rem; border-radius: 8px; border: 1px solid #dbe3ef; font-size: 0.82rem; font-weight: 400; color: #475569; cursor: pointer;">
                                <option value="all">Todos los parches</option>
                                <option value="Transversal">Transversales</option>
                                <option value="ECBTI">ECBTI</option>
                                <option value="ECACEN">ECACEN</option>
                                <option value="ECSAH">ECSAH</option>
                                <option value="ECJP">ECJP</option>
                                <option value="ECEDU">ECEDU</option>
                                <option value="ECISA">ECISA</option>
                            </select>
                            <button id="btn-open-create-parche" style="background: var(--accent-primary); color: white; border: none; height: 38px; padding: 0 0.9rem; border-radius: 8px; display: flex; align-items: center; gap: 0.45rem; font-size: 0.8rem; font-weight: 400; cursor: pointer; box-shadow: 0 4px 10px rgba(0,77,153,0.16);">
                                <i data-lucide="plus" style="width: 15px;"></i> Armar parche
                            </button>
                        </div>
                    </div>

                    <div id="parches-grid" class="grid-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.9rem;">
                        <!-- Parches dynamically rendered here -->
                    </div>
                </div>

                <div id="parche-chat-view" style="display: none; height: calc(100vh - 170px); background: #ffffff; border-radius: 8px; border: 1px solid #dbe3ef; flex-direction: column; overflow: hidden;">
                    <div class="chat-header" style="padding: 0.9rem 1rem; background: #ffffff; color: var(--text-primary); border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <button onclick="backToParches()" title="Volver" style="background: #f4f6f9; border: 1px solid #dbe3ef; color: var(--text-primary); width: 34px; height: 34px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;"><i data-lucide="arrow-left" style="width: 17px;"></i></button>
                            <div>
                                <h3 id="chat-title" style="font-size: 1rem; font-weight: 400; margin: 0; color: var(--accent-primary);">Nombre del Parche</h3>
                                <p id="chat-course-subtitle" style="font-size: 0.72rem; color: var(--text-secondary); margin: 0.16rem 0 0;">Espacio de colaboración</p>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.6rem;">
                            <div id="chat-members-count" style="font-size: 0.76rem; font-weight: 400; color: var(--text-secondary); background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.38rem 0.6rem; border-radius: 6px;">3 miembros</div>
                            <button style="background: var(--accent-primary); color: white; border: none; height: 34px; padding: 0 0.75rem; border-radius: 6px; font-size: 0.78rem; cursor: pointer;">Unirme</button>
                        </div>
                    </div>
                    <div id="chat-messages" style="flex: 1; padding: 1rem; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 0.65rem;"></div>
                    <div class="chat-input-area" style="padding: 0.85rem 1rem; border-top: 1px solid #e2e8f0; display: flex; gap: 0.6rem; background: #ffffff; align-items: center;">
                        <button title="Adjuntar documento" style="background: transparent; color: #94a3b8; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0.3rem; transition: 0.2s;"><i data-lucide="paperclip" style="width: 18px;"></i></button>
                        <button title="Adjuntar imagen" style="background: transparent; color: #94a3b8; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0.3rem; transition: 0.2s;"><i data-lucide="image" style="width: 18px;"></i></button>
                        <input type="text" id="chat-input" placeholder="Escribe un mensaje..." style="flex: 1; border: 1px solid #dbe3ef; padding: 0.68rem 0.85rem; border-radius: 6px; outline: none; font-size: 0.84rem; background: #f8fafc;">
                        <button onclick="sendParcheMessage()" style="background: var(--accent-primary); color: white; border: none; width: 38px; height: 38px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                            <i data-lucide="send" style="width: 16px;"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="parche-modal-overlay" class="modal-overlay">
        <div class="modal-content" style="width: 680px; max-width: calc(100vw - 2rem); border-radius: 12px; padding: 2rem; text-align: left;">
            <div style="margin-bottom: 1.4rem; text-align: center;">
                <h3 style="font-size: 1.35rem; font-weight: 400; color: #20242a; margin-bottom: 0.35rem;">Armar parche</h3>
                <p style="font-size: 0.88rem; color: #8a9099;">Crea un grupo compacto para estudiar.</p>
            </div>

            <form id="create-parche-form">
                <div style="display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 1.2rem; align-items: start;">
                    <div>
                        <label style="font-size: 0.78rem; font-weight: 400; color: #252a31; margin-bottom: 0.45rem; display: block;">Nombre del parche</label>
                        <input type="text" id="p-name" placeholder="Ej: Los aplicados" required class="form-input" style="border-radius: 10px; padding: 0.78rem 1rem; font-size: 0.88rem; margin-bottom: 0.85rem;">

                        <label style="font-size: 0.78rem; font-weight: 400; color: #252a31; margin-bottom: 0.45rem; display: block;">Curso</label>
                        <input type="text" id="p-course" placeholder="Ej: Cálculo integral" required class="form-input" style="border-radius: 10px; padding: 0.78rem 1rem; font-size: 0.88rem; margin-bottom: 0;">
                    </div>

                    <div>
                        <label style="font-size: 0.78rem; font-weight: 400; color: #252a31; margin-bottom: 0.45rem; display: block;">Fase</label>
                        <input type="text" id="p-phase" placeholder="Ej: Fase 2" required class="form-input" style="border-radius: 10px; padding: 0.78rem 1rem; font-size: 0.88rem; margin-bottom: 0.85rem;">

                        <label style="font-size: 0.78rem; font-weight: 400; color: #252a31; margin-bottom: 0.45rem; display: block;">Tipo</label>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 0.85rem;">
                            <label class="parche-type-option active" style="height: 42px; border-radius: 10px; background: #e9edf3; color: #252a31; display: flex; align-items: center; justify-content: center; font-size: 0.84rem; font-weight: 400; cursor: pointer;">
                                <input type="radio" name="parche-type" value="Transversal" checked style="display: none;">
                                Transversal
                            </label>
                            <label class="parche-type-option" style="height: 42px; border-radius: 10px; background: #f4f6f9; color: #64748b; display: flex; align-items: center; justify-content: center; font-size: 0.84rem; font-weight: 400; cursor: pointer;">
                                <input type="radio" name="parche-type" value="Escuela" style="display: none;">
                                Escuela
                            </label>
                        </div>

                        <div id="school-select-container" style="visibility: hidden; opacity: 0; pointer-events: none; min-height: 82px; transition: opacity 0.15s ease;">
                            <label style="font-size: 0.78rem; font-weight: 400; color: #252a31; margin-bottom: 0.45rem; display: block;">Escuela</label>
                            <select id="p-school-select" class="form-input" style="border-radius: 10px; padding: 0.78rem 1rem; font-size: 0.88rem; margin-bottom: 0;">
                                <option value="ECBTI">ECBTI</option>
                                <option value="ECACEN">ECACEN</option>
                                <option value="ECSAH">ECSAH</option>
                                <option value="ECJP">ECJP</option>
                                <option value="ECEDU">ECEDU</option>
                                <option value="ECISA">ECISA</option>
                                <option value="ECAPMA">ECAPMA</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 1rem;">
                    <label style="font-size: 0.78rem; font-weight: 400; color: #252a31; margin-bottom: 0.45rem; display: block;">Añadir miembros (Búsqueda por Nombre o Programa)</label>
                    <div style="display: flex; align-items: center; background: #f8fafc; border: 1px solid #dbe3ef; border-radius: 10px; padding: 0.5rem 1rem;">
                        <i data-lucide="search" style="width: 16px; color: #94a3b8; margin-right: 0.5rem;"></i>
                        <input type="text" placeholder="Ej: Jorge o Psicología" style="flex: 1; border: none; outline: none; background: transparent; font-size: 0.88rem;">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin: 1.4rem auto 0; max-width: 360px;">
                    <button type="button" class="btn-close-parche" style="background: #e9edf3; color: #252a31; border: none; height: 42px; border-radius: 8px; font-weight: 400; cursor: pointer;">Cancelar</button>
                    <button type="submit" style="background: #9ea3aa; color: white; border: none; height: 42px; border-radius: 8px; font-weight: 400; cursor: pointer;">Crear</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="script_pages.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
