<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNAD Conect - Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <header class="top-header">
            <div class="logo-section">
                <button id="sidebar-toggle" style="background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 6px; margin-right: 0.2rem;" title="Contraer/Expandir Menú">
                    <i data-lucide="menu"></i>
                </button>
                <div onclick="window.location.href='index.html'" style="cursor: pointer; display: flex; align-items: center; gap: 0.8rem;">
                    <svg width="36" height="36" viewBox="0 0 100 100" aria-hidden="true">
                        <circle cx="50" cy="50" r="15" fill="#004d99" />
                        <circle cx="20" cy="20" r="10" fill="#ffcc00" />
                        <circle cx="80" cy="20" r="10" fill="#ffcc00" />
                        <circle cx="50" cy="85" r="10" fill="#ffcc00" />
                        <line x1="50" y1="50" x2="20" y2="20" stroke="#004d99" stroke-width="4" />
                        <line x1="50" y1="50" x2="80" y2="20" stroke="#004d99" stroke-width="4" />
                        <line x1="50" y1="50" x2="50" y2="85" stroke="#004d99" stroke-width="4" />
                    </svg>
                    <span style="font-size: 1.2rem; color: var(--accent-primary); font-weight: 400;">UNAD<span style="color: #64748b; font-weight: 400;">Conect</span></span>
                </div>
            </div>
            <div class="header-icons" style="margin-left: auto;">
                <i data-lucide="bell"></i>
                <div id="user-avatar-top" style="width: 38px; height: 38px; border-radius: 6px; background: var(--accent-primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 400;">?</div>
            </div>
        </header>

        <div class="main-body">
            <aside class="sidebar">
                <nav style="flex: 1;">
                    <a href="index.html" class="nav-item">
                        <i data-lucide="users"></i>
                        <span class="nav-text">Contactos</span>
                    </a>
                    <a href="comunidad.html" class="nav-item">
                        <i data-lucide="globe"></i>
                        <span class="nav-text">Comunidad</span>
                    </a>
                    <a href="parche.html" class="nav-item">
                        <i data-lucide="shrub"></i>
                        <span class="nav-text">Parches</span>
                    </a>
                    <a href="perfil.html" class="nav-item active">
                        <i data-lucide="user-circle"></i>
                        <span class="nav-text">Mi Perfil</span>
                    </a>
                </nav>
            </aside>

            <main class="content-area" style="display: flex; align-items: center; justify-content: center;">
                <section id="profile-empty-state" style="width: min(800px, 100%); text-align: center; padding: 2rem;">
                    <div id="profile-avatar-large" style="width: 132px; height: 132px; border-radius: 50%; background: #f1f5f9; border: 1px solid #dbe3ef; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.2rem; overflow: hidden;">
                        <i data-lucide="camera" style="width: 42px; height: 42px;"></i>
                    </div>
                    <h2 id="profile-display-name" class="content-title" style="margin-bottom: 0.35rem;">Crear mi perfil</h2>
                    <div id="profile-display-desc" style="color: var(--text-secondary); font-size: 0.9rem; max-width: 100%; margin: 0 auto 1.3rem; line-height: 1.45;">Registra tus datos para empezar a aparecer en Comunidad y conectar con tus compañeros.</div>
                    <button type="button" id="open-profile-modal-btn" style="background: var(--accent-primary); color: white; border: none; height: 40px; padding: 0 1.2rem; border-radius: 6px; cursor: pointer;">Crear mi perfil</button>
                    <div id="profile-save-status" style="font-size: 0.82rem; color: var(--text-secondary); margin-top: 0.9rem;"></div>
                    
                    <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px dashed #dbe3ef; opacity: 0.6;">
                        <p style="font-size: 0.75rem; color: #8a9099; margin-bottom: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Zona de Desarrollador</p>
                        <button type="button" onclick="nukeDatabase()" style="background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; height: 34px; padding: 0 1rem; border-radius: 6px; cursor: pointer; font-size: 0.75rem; transition: 0.2s;">Limpiar Base de Datos Cloud</button>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div id="profile-modal-overlay" class="modal-overlay">
        <div class="modal-content" style="width: 980px; max-width: calc(100vw - 2rem); border-radius: 10px; padding: 1.7rem 2.1rem; text-align: left;">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 0.2rem;">
                <button type="button" id="close-profile-modal-btn" title="Cerrar" style="width: 32px; height: 32px; border-radius: 6px; border: 1px solid #dbe3ef; background: #f8fafc; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;">
                    <i data-lucide="x" style="width: 17px;"></i>
                </button>
            </div>

            <form id="profile-form">
                <div style="text-align: center; margin-bottom: 1.1rem;">
                    <div id="profile-photo-preview" style="width: 92px; height: 92px; border-radius: 50%; background: #f1f5f9; border: 1px solid #dbe3ef; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; overflow: hidden;">
                        <i data-lucide="camera" style="width: 34px; height: 34px;"></i>
                    </div>
                    <h3 style="font-size: 1.35rem; line-height: 1.25; font-weight: 400; color: #20242a; margin-bottom: 0.22rem;">Crea tu perfil UNAD Conect</h3>
                    <p style="font-size: 0.88rem; color: #8a9099; margin-bottom: 0.8rem;">Tu teléfono solo será visible para contactos aceptados.</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; width: 320px; max-width: 100%; margin: 0 auto;">
                        <button type="button" id="take-photo-btn" style="background: #e9edf3; color: #252a31; border: none; height: 38px; border-radius: 8px; cursor: pointer;">Tomar foto</button>
                        <button type="button" id="upload-photo-btn" style="background: #9ea3aa; color: white; border: none; height: 38px; border-radius: 8px; cursor: pointer;">Cargar foto</button>
                    </div>
                    <input id="profile-camera-input" type="file" accept="image/*" capture="user" style="display: none;">
                    <input id="profile-photo-input" type="file" accept="image/*" style="display: none;">
                </div>

                <div style="display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 0.7rem 0.85rem;">
                    <div>
                        <label class="form-label" for="profile-name">Nombre completo</label>
                        <input id="profile-name" class="form-input" type="text" placeholder="Nombre y apellidos" required>
                    </div>
                    <div>
                        <label class="form-label" for="profile-phone">Teléfono</label>
                        <input id="profile-phone" class="form-input" type="tel" placeholder="Número de contacto" required>
                    </div>
                    <div>
                        <label class="form-label" for="profile-email">Correo institucional</label>
                        <input id="profile-email" class="form-input" type="email" placeholder="correo@unad.edu.co" required>
                    </div>
                    <div>
                        <label class="form-label" for="profile-birthday">Fecha de nacimiento</label>
                        <input id="profile-birthday" class="form-input" type="date">
                    </div>
                    <div>
                        <label class="form-label" for="profile-role">Estamento</label>
                        <select id="profile-role" class="form-input" required>
                            <option value="Estudiante">Estudiante</option>
                            <option value="Docente">Docente</option>
                            <option value="Administrativo">Administrativo</option>
                            <option value="Egresado">Egresado</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label" for="profile-city">Ciudad de residencia</label>
                        <input id="profile-city" class="form-input" type="text" placeholder="Ciudad">
                    </div>
                    <div>
                        <label class="form-label" for="profile-school">Escuela</label>
                        <select id="profile-school" class="form-input">
                            <option value="">Selecciona una escuela</option>
                            <option value="ECACEN">ECACEN</option>
                            <option value="ECBTI">ECBTI</option>
                            <option value="ECAPMA">ECAPMA</option>
                            <option value="ECEDU">ECEDU</option>
                            <option value="ECISA">ECISA</option>
                            <option value="ECJP">ECJP</option>
                            <option value="ECSAH">ECSAH</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label" for="profile-program">Programa</label>
                        <select id="profile-program" class="form-input">
                            <option value="">Selecciona primero una escuela</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label" for="profile-semester">Semestre</label>
                        <input id="profile-semester" class="form-input" type="number" min="1" max="12" placeholder="Semestre">
                    </div>
                    <div>
                        <label class="form-label" for="profile-zone">Zona</label>
                        <select id="profile-zone" class="form-input" required>
                            <option value="">Selecciona una zona</option>
                            <option value="ZCBC">ZCBC</option>
                            <option value="ZCAR">ZCAR</option>
                            <option value="ZSUR">ZSUR</option>
                            <option value="ZOCC">ZOCC</option>
                            <option value="ZBOY">ZBOY</option>
                            <option value="ZCORI">ZCORI</option>
                            <option value="ZCSUR">ZCSUR</option>
                            <option value="ZAMAZ">ZAMAZ</option>
                            <option value="FLORIDA">FLORIDA</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label" for="profile-center">Centro</label>
                        <select id="profile-center" class="form-input" required>
                            <option value="">Selecciona primero una zona</option>
                        </select>
                    </div>
                    <div id="profile-department-wrap" style="display: none;">
                        <label class="form-label" for="profile-department">Área (Docencia/Investigación)</label>
                        <input id="profile-department" class="form-input" type="text" placeholder="Área">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; width: 360px; max-width: 100%; margin: 1.15rem auto 0;">
                    <button type="button" id="profile-clear-btn" style="background: #e9edf3; color: #252a31; border: none; height: 40px; padding: 0 1rem; border-radius: 8px; cursor: pointer;">Cancelar</button>
                    <button type="submit" style="background: #9ea3aa; color: white; border: none; height: 40px; padding: 0 1.2rem; border-radius: 8px; cursor: pointer;">Continuar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="script_pages.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
